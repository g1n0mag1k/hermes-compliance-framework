version: "3.9"
services:
  hermes:
    image: hermes-compliance:1.0.0
    deploy:
      replicas: 1
    ports:
      - "8000:8000"
    env_file:
      - .env.hermes
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - hermes-internal
networks:
  hermes-internal:
    internal: true
    driver: bridge
