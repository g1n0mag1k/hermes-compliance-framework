# DeepSource configuration for hermes-compliance-framework
# Audit anchor: this file is the version-controlled source of truth for
# what static analysis ran at each commit. All overrides go through PR
# review; the DeepSource dashboard is never the authoritative source.

version = 1

test_patterns = [
  "tests/**",
  "**/test_*.py",
  "**/*_test.py",
]

[[analyzers]]
name = "python"
enabled = true

  [analyzers.meta]
  runtime_version = "3.12.3"
  max_line_length = 88

[[analyzers]]
name = "secrets"
enabled = true
