name: Hermes CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: g1n0mag1k/hermes-compliance

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Tests must pass before anything else runs
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        run: pytest -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Dependency audit (runs in parallel with tests)
  # ─────────────────────────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install direct dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit on direct dependencies
        # Flags only CVEs in direct pins — transitive starlette findings
        # are acknowledged in PHASE2_AUDIT_TRAIL.md and do not block CI.
        # Remove --ignore-vuln flags once starlette is patched upstream.
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln GHSA-f96h-pmfr-66vw \
            --ignore-vuln GHSA-jjg7-2v4v-x38h \
            --ignore-vuln GHSA-qj8w-rv5x-2v9h \
            --ignore-vuln GHSA-74m5-2c7w-9w3x \
            --ignore-vuln GHSA-6vqw-3v5j-54x4 \
            --ignore-vuln GHSA-35jj-vqcf-f2jf \
            --ignore-vuln GHSA-cp75-3r2x-4qmc \
            --ignore-vuln GHSA-h8gr-9994-4x4g

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build & push to GHCR (only on green test + audit, only on main)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [ test, audit ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=1.0.0
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
