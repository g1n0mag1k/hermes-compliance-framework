# Dependabot configuration for hermes-compliance-framework
# Audit anchor: this file is the version-controlled source of truth for
# automated dependency monitoring. All overrides go through PR review.

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    reviewers:
      - "g1n0mag1k"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "en-core-web-lg"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    reviewers:
      - "g1n0mag1k"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
